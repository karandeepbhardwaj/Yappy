  <path d="M486 390 Q506 407 486 424" fill="none" stroke="#FFAB00" stroke-width="5" stroke-linecap="round" style="fill:none;stroke:rgb(255, 171, 0);color:rgb(255, 255, 255);stroke-width:5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M498 378 Q528 407 498 436" fill="none" stroke="#FFAB00" stroke-width="4" stroke-linecap="round" opacity="0.6" style="fill:none;stroke:rgb(255, 171, 0);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M510 366 Q550 407 510 448" fill="none" stroke="#FFAB00" stroke-width="3" stroke-linecap="round" opacity="0.3" style="fill:none;stroke:rgb(255, 171, 0);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
