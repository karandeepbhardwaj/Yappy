  <path d="M418 460 Q418 500 449 506" fill="none" stroke="#F5A000" stroke-width="7" stroke-linecap="round" style="fill:none;stroke:rgb(245, 160, 0);color:rgb(255, 255, 255);stroke-width:7px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M480 460 Q480 500 449 506" fill="none" stroke="#F5A000" stroke-width="7" stroke-linecap="round" style="fill:none;stroke:rgb(245, 160, 0);color:rgb(255, 255, 255);stroke-width:7px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Base -->
  <line x1="422" y1="506" x2="476" y2="506" stroke="#F5A000" stroke-width="8" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 160, 0);color:rgb(255, 255, 255);stroke-width:8px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

