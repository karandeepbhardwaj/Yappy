  <line x1="428" y1="403" x2="470" y2="403" stroke="#CC8800" stroke-width="2" stroke-linecap="round" opacity="0.45" style="fill:rgb(0, 0, 0);stroke:rgb(204, 136, 0);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.45;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="428" y1="416" x2="470" y2="416" stroke="#CC8800" stroke-width="2" stroke-linecap="round" opacity="0.45" style="fill:rgb(0, 0, 0);stroke:rgb(204, 136, 0);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.45;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="430" y1="429" x2="468" y2="429" stroke="#CC8800" stroke-width="2" stroke-linecap="round" opacity="0.45" style="fill:rgb(0, 0, 0);stroke:rgb(204, 136, 0);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.45;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Mic stem -->
